version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payverify-backend
    restart: always
    ports:
      - "6000:6000"
    env_file:
      - .env
    environment:
      - PORT=6000
      - REDIS_URL=redis://default:checkbirr!162127@redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: payverify-redis
    restart: always
    command: redis-server --requirepass checkbirr!162127
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
